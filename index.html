<script>

async function conectarBLE(){

    if (!navigator.bluetooth) {

        alert(
        "Este navegador NO soporta Web Bluetooth.\n\n" +
        "Usa Google Chrome o Microsoft Edge en Android o Windows."
        );

        return;
    }

    try {

        const device =
        await navigator.bluetooth.requestDevice({

            filters: [
                {
                    name: "ESP32_NARANJAS"
                }
            ],

            optionalServices: [
                "12345678-1234-1234-1234-123456789abc"
            ]

        });

        alert(
        "Dispositivo encontrado: " +
        device.name
        );

    }
    catch(error){

        alert(
        "Error BLE:\n" +
        error
        );

    }

}

</script>
